<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revvy - Documentos Legais</title>
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #6C63FF;
      --accent-light: #E8E6FF;
      --gray-50: #F9FAFB;
      --gray-200: #E5E7EB;
      --gray-500: #6B7280;
      --gray-700: #374151;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-700);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      color: white;
      font-weight: 700;
    }

    h1 {
      color: var(--primary);
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--gray-500);
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      text-decoration: none;
      color: var(--gray-700);
      transition: all 0.2s;
      text-align: left;
    }

    .link-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.12);
      transform: translateY(-1px);
    }

    .link-card h2 {
      font-size: 1.05rem;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    .link-card p {
      font-size: 0.85rem;
      color: var(--gray-500);
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">R</div>
  <h1>Revvy</h1>
  <p class="subtitle">Documentos Legais | Legal Documents</p>

  <div class="links">
    <a href="./privacy.html" class="link-card">
      <h2>Politica de Privacidade</h2>
      <p>Privacy Policy</p>
    </a>
    <a href="./terms.html" class="link-card">
      <h2>Termos de Uso</h2>
      <p>Terms of Use</p>
    </a>
    <a href="./delete-account.html" class="link-card">
      <h2>Como Excluir Minha Conta</h2>
      <p>How to Delete My Account</p>
    </a>
  </div>
</div>

<div class="footer">
  &copy; 2026 BeecodeIT (CNPJ: 50.025.597/0001-05)
</div>

</body>
</html>
